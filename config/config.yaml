features:
  window_size: 60
  windows: [5, 15, 30, 60]
  lags: [1, 5, 15, 30]
  lookahead_minutes: 15

model:
  ensemble_weights:
    isolation_forest: 0.3
    xgboost: 0.7
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  isolation_forest:
    n_estimators: 100
