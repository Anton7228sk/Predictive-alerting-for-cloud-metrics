data:
  metrics:
    - namespace: AWS/EC2
      metric_name: CPUUtilization
      stat: Average
      period_seconds: 60
    - namespace: AWS/ApplicationELB
      metric_name: TargetResponseTime
      stat: p99
      period_seconds: 60
    - namespace: AWS/ApplicationELB
      metric_name: HTTPCode_ELB_5XX_Count
      stat: Sum
      period_seconds: 60
  lookback_days: 30

features:
  windows: [5, 15, 30, 60]
  lags: [1, 5, 15, 30]
  lookahead_minutes: 15

model:
  ensemble_weights:
    isolation_forest: 0.3
    xgboost: 0.7
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  isolation_forest:
    contamination: auto
    n_estimators: 100

alerting:
  threshold: 0.65
  cooldown_minutes: 5
  evaluation:
    target_recall: 0.8

storage:
  type: s3
  bucket: predictive-alerting-artifacts
  prefix: models/
  local_fallback: ./artifacts/
